interface:
  display_name: "Yao Demand Skill"
  short_description: "Evaluate product demand with a visual demand-triangle diagnostic report"
  default_prompt: "Use $yao-demand-skill to assess this product's demand foundation and produce a visual diagnosis with 10+ chart modules plus Markdown, HTML, Word, and PDF reports."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
